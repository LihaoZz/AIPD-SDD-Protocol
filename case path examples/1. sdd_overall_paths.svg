<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1450" viewBox="0 0 1900 1450" role="img" aria-labelledby="title desc">
  <title id="title">SDD Protocol case paths</title>
  <desc id="desc">A feature request entering the SDD protocol, branching by scene path and experience delivery mode.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #15202b; }
      .subtitle { font: 400 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #455a64; }
      .label { font: 700 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #102027; }
      .body { font: 400 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #263238; }
      .small { font: 400 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #546e7a; }
      .node { fill: #ffffff; stroke: #90a4ae; stroke-width: 1.5; rx: 18; ry: 18; }
      .root { fill: #ffffff; stroke: #1f4b99; stroke-width: 2.2; }
      .scene-greenfield { fill: #d9f3ea; stroke: #1b7f5c; stroke-width: 2; }
      .scene-expansion { fill: #dfeeff; stroke: #2d6cca; stroke-width: 2; }
      .scene-continue { fill: #fff0d7; stroke: #d98615; stroke-width: 2; }
      .scene-review { fill: #eceff1; stroke: #607d8b; stroke-width: 2; }
      .scene-recovery { fill: #ffe2de; stroke: #cc4b37; stroke-width: 2; }
      .gate { fill: #eef7ff; stroke: #2f6fb2; stroke-width: 2.2; }
      .mode-builder { fill: #e4f7eb; stroke: #2c8c5e; stroke-width: 2; }
      .mode-external { fill: #fff4df; stroke: #d28410; stroke-width: 2; }
      .mode-hybrid { fill: #e5f6f5; stroke: #1b8d83; stroke-width: 2; }
      .review-outcome { fill: #f3f5f6; stroke: #5f6f78; stroke-width: 2; }
      .line { stroke: #607d8b; stroke-width: 2.2; fill: none; }
      .soft { stroke: #90a4ae; stroke-width: 2; fill: none; }
      .dashed { stroke: #78909c; stroke-width: 2; fill: none; stroke-dasharray: 8 6; }
      .divider { stroke: #d7dee2; stroke-width: 1.2; stroke-dasharray: 5 5; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#607d8b" />
    </marker>
    <marker id="arrowSoft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#78909c" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1450" />

  <text class="title" x="950" y="46" text-anchor="middle">SDD 协议中的一个 Case：同一需求在不同发展方向下的路径节点</text>
  <text class="subtitle" x="950" y="74" text-anchor="middle">先按 scene 分流，再在需要时按 experience_delivery_mode 分流；节点名称对齐 docs/00_lifecycle.md</text>

  <rect class="root" x="700" y="110" width="500" height="84" rx="18" ry="18" />
  <text class="label" x="950" y="140" text-anchor="middle">Case 输入</text>
  <text class="body" x="950" y="164" text-anchor="middle">用户提出一个功能需求</text>
  <text class="small" x="950" y="184" text-anchor="middle">例如：新增一个产品能力、补做中断任务、审查一段已完成实现</text>

  <rect class="root" x="700" y="225" width="500" height="102" rx="18" ry="18" />
  <text class="label" x="950" y="255" text-anchor="middle">PREFLIGHT</text>
  <text class="body" x="950" y="279" text-anchor="middle">运行 Project Preflight，先判断能不能安全开始</text>
  <text class="small" x="950" y="301" text-anchor="middle">输出：ready / bootstrap_required / blocked</text>
  <text class="small" x="950" y="319" text-anchor="middle">blocked 时只补最小缺失上下文；bootstrap_required 时先补基础工件</text>

  <rect class="root" x="700" y="360" width="500" height="84" rx="18" ry="18" />
  <text class="label" x="950" y="390" text-anchor="middle">INIT</text>
  <text class="body" x="950" y="414" text-anchor="middle">识别 scene、工作根、活动工件与首个角色</text>

  <line class="line" x1="950" y1="194" x2="950" y2="225" marker-end="url(#arrow)" />
  <line class="line" x1="950" y1="327" x2="950" y2="360" marker-end="url(#arrow)" />

  <line class="soft" x1="950" y1="444" x2="180" y2="520" marker-end="url(#arrow)" />
  <line class="soft" x1="950" y1="444" x2="550" y2="520" marker-end="url(#arrow)" />
  <line class="soft" x1="950" y1="444" x2="920" y2="520" marker-end="url(#arrow)" />
  <line class="soft" x1="950" y1="444" x2="1290" y2="520" marker-end="url(#arrow)" />
  <line class="soft" x1="950" y1="444" x2="1660" y2="520" marker-end="url(#arrow)" />

  <line class="divider" x1="360" y1="480" x2="360" y2="980" />
  <line class="divider" x1="730" y1="480" x2="730" y2="980" />
  <line class="divider" x1="1100" y1="480" x2="1100" y2="980" />
  <line class="divider" x1="1470" y1="480" x2="1470" y2="980" />

  <rect class="scene-greenfield" x="40" y="520" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="548" text-anchor="middle">`greenfield`</text>
  <text class="small" x="180" y="569" text-anchor="middle">新产品 / 新功能域</text>
  <rect class="node" x="40" y="612" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="640" text-anchor="middle">DISCOVERY</text>
  <text class="small" x="180" y="661" text-anchor="middle">澄清事实、假设、风险、范围外</text>
  <rect class="node" x="40" y="704" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="732" text-anchor="middle">SPEC</text>
  <text class="small" x="180" y="753" text-anchor="middle">写产品真理与 8 元本体框架</text>
  <rect class="node" x="40" y="796" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="824" text-anchor="middle">QUALITY_SETUP</text>
  <text class="small" x="180" y="845" text-anchor="middle">建立质量规则与检查基线</text>
  <rect class="node" x="40" y="888" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="916" text-anchor="middle">FB_PLANNING</text>
  <text class="small" x="180" y="937" text-anchor="middle">拆出首批 FB / MB</text>
  <rect class="node" x="40" y="980" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="180" y="1008" text-anchor="middle">HANDOFF_DECISION</text>
  <text class="small" x="180" y="1029" text-anchor="middle">进入体验交付分流</text>
  <line class="line" x1="180" y1="582" x2="180" y2="612" marker-end="url(#arrow)" />
  <line class="line" x1="180" y1="674" x2="180" y2="704" marker-end="url(#arrow)" />
  <line class="line" x1="180" y1="766" x2="180" y2="796" marker-end="url(#arrow)" />
  <line class="line" x1="180" y1="858" x2="180" y2="888" marker-end="url(#arrow)" />
  <line class="line" x1="180" y1="950" x2="180" y2="980" marker-end="url(#arrow)" />

  <rect class="scene-expansion" x="410" y="520" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="548" text-anchor="middle">`expansion`</text>
  <text class="small" x="550" y="569" text-anchor="middle">既有系统新增能力</text>
  <rect class="node" x="410" y="612" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="640" text-anchor="middle">FEATURE_DISCOVERY</text>
  <text class="small" x="550" y="661" text-anchor="middle">看清新能力与回归风险</text>
  <rect class="node" x="410" y="704" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="732" text-anchor="middle">DELTA_SPEC</text>
  <text class="small" x="550" y="753" text-anchor="middle">只写增量，不重写全局</text>
  <rect class="node" x="410" y="796" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="824" text-anchor="middle">FB_DETAILING</text>
  <text class="small" x="550" y="845" text-anchor="middle">细化影响层与验收</text>
  <rect class="node" x="410" y="888" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="916" text-anchor="middle">MB_PLANNING</text>
  <text class="small" x="550" y="937" text-anchor="middle">拆成小而可审计的 MB</text>
  <rect class="node" x="410" y="980" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="550" y="1008" text-anchor="middle">HANDOFF_DECISION</text>
  <text class="small" x="550" y="1029" text-anchor="middle">进入体验交付分流</text>
  <line class="line" x1="550" y1="582" x2="550" y2="612" marker-end="url(#arrow)" />
  <line class="line" x1="550" y1="674" x2="550" y2="704" marker-end="url(#arrow)" />
  <line class="line" x1="550" y1="766" x2="550" y2="796" marker-end="url(#arrow)" />
  <line class="line" x1="550" y1="858" x2="550" y2="888" marker-end="url(#arrow)" />
  <line class="line" x1="550" y1="950" x2="550" y2="980" marker-end="url(#arrow)" />

  <rect class="scene-continue" x="780" y="520" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="920" y="548" text-anchor="middle">`continue`</text>
  <text class="small" x="920" y="569" text-anchor="middle">恢复中断工作</text>
  <rect class="node" x="780" y="650" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="920" y="678" text-anchor="middle">STATE_RECONSTRUCTION</text>
  <text class="small" x="920" y="699" text-anchor="middle">重建 active FB / MB / 失败点</text>
  <rect class="node" x="780" y="780" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="920" y="808" text-anchor="middle">NEXT_ACTION_SELECTION</text>
  <text class="small" x="920" y="829" text-anchor="middle">选下一个最小安全动作</text>
  <rect class="node" x="780" y="910" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="920" y="938" text-anchor="middle">HANDOFF_DECISION</text>
  <text class="small" x="920" y="959" text-anchor="middle">决定直接跑 MB 或等待输入</text>
  <line class="line" x1="920" y1="582" x2="920" y2="650" marker-end="url(#arrow)" />
  <line class="line" x1="920" y1="712" x2="920" y2="780" marker-end="url(#arrow)" />
  <line class="line" x1="920" y1="842" x2="920" y2="910" marker-end="url(#arrow)" />

  <rect class="scene-review" x="1150" y="520" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1290" y="548" text-anchor="middle">`review`</text>
  <text class="small" x="1290" y="569" text-anchor="middle">审查已完成实现</text>
  <rect class="node" x="1150" y="650" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1290" y="678" text-anchor="middle">AUDIT_PREP</text>
  <text class="small" x="1290" y="699" text-anchor="middle">收集 diff、证据、真理源工件</text>
  <rect class="node" x="1150" y="780" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1290" y="808" text-anchor="middle">EVIDENCE_REVIEW</text>
  <text class="small" x="1290" y="829" text-anchor="middle">核对 scope / ontology / quality</text>
  <rect class="node" x="1150" y="910" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1290" y="938" text-anchor="middle">QUALITY_REPORTING</text>
  <text class="small" x="1290" y="959" text-anchor="middle">产出结构化质量报告</text>
  <rect class="review-outcome" x="1120" y="1010" width="340" height="132" rx="18" ry="18" />
  <text class="label" x="1290" y="1040" text-anchor="middle">Review 输出</text>
  <text class="body" x="1290" y="1064" text-anchor="middle">通过：进入关闭或下一阶段</text>
  <text class="body" x="1290" y="1086" text-anchor="middle">失败：按 ownership 路由</text>
  <text class="small" x="1290" y="1108" text-anchor="middle">Builder / Spec Architect / Recovery Coordinator</text>
  <line class="line" x1="1290" y1="582" x2="1290" y2="650" marker-end="url(#arrow)" />
  <line class="line" x1="1290" y1="712" x2="1290" y2="780" marker-end="url(#arrow)" />
  <line class="line" x1="1290" y1="842" x2="1290" y2="910" marker-end="url(#arrow)" />
  <line class="line" x1="1290" y1="972" x2="1290" y2="1010" marker-end="url(#arrow)" />

  <rect class="scene-recovery" x="1520" y="520" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1660" y="548" text-anchor="middle">`recovery`</text>
  <text class="small" x="1660" y="569" text-anchor="middle">修复混乱或损坏状态</text>
  <rect class="node" x="1520" y="612" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1660" y="640" text-anchor="middle">FAILURE_CLASSIFICATION</text>
  <text class="small" x="1660" y="661" text-anchor="middle">先判定 spec_gap / state_drift 等</text>
  <rect class="node" x="1520" y="704" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1660" y="732" text-anchor="middle">RECOVERY_DECISION</text>
  <text class="small" x="1660" y="753" text-anchor="middle">选择最小安全动作</text>
  <rect class="node" x="1520" y="796" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1660" y="824" text-anchor="middle">STATE_REPAIR</text>
  <text class="small" x="1660" y="845" text-anchor="middle">先修 SESSION_STATE 与工件引用</text>
  <rect class="node" x="1520" y="888" width="280" height="62" rx="16" ry="16" />
  <text class="label" x="1660" y="916" text-anchor="middle">HANDOFF_DECISION</text>
  <text class="small" x="1660" y="937" text-anchor="middle">修完后回到安全执行路径</text>
  <line class="line" x1="1660" y1="582" x2="1660" y2="612" marker-end="url(#arrow)" />
  <line class="line" x1="1660" y1="674" x2="1660" y2="704" marker-end="url(#arrow)" />
  <line class="line" x1="1660" y1="766" x2="1660" y2="796" marker-end="url(#arrow)" />
  <line class="line" x1="1660" y1="858" x2="1660" y2="888" marker-end="url(#arrow)" />

  <rect class="gate" x="520" y="1088" width="860" height="96" rx="20" ry="20" />
  <text class="label" x="950" y="1120" text-anchor="middle">共享分流器：`experience_delivery_mode`</text>
  <text class="body" x="950" y="1145" text-anchor="middle">当 scene 到达 `HANDOFF_DECISION`，父 FB 必须明确体验层由谁交付</text>
  <text class="small" x="950" y="1168" text-anchor="middle">可选：builder_generated / external_ui_package / hybrid / not_applicable</text>

  <path class="dashed" d="M180 1042 C180 1075, 320 1088, 520 1120" marker-end="url(#arrowSoft)" />
  <path class="dashed" d="M550 1042 C550 1070, 660 1088, 700 1120" marker-end="url(#arrowSoft)" />
  <path class="dashed" d="M920 972 C920 1030, 910 1068, 920 1088" marker-end="url(#arrowSoft)" />
  <path class="dashed" d="M1660 950 C1660 1040, 1450 1084, 1380 1120" marker-end="url(#arrowSoft)" />

  <rect class="mode-builder" x="80" y="1230" width="500" height="166" rx="20" ry="20" />
  <text class="label" x="330" y="1262" text-anchor="middle">路径 A：`builder_generated` / `not_applicable`</text>
  <text class="body" x="330" y="1288" text-anchor="middle">体验层由 Builder 直接承担，或该 MB 不涉及 UI</text>
  <text class="body" x="330" y="1312" text-anchor="middle">继续常规 MB：实现 - 校验 - Review Gate - Close</text>
  <text class="small" x="330" y="1336" text-anchor="middle">典型结果：passed；L2 进入 review，L3 可直接 close</text>
  <text class="small" x="330" y="1358" text-anchor="middle">如果 verification 失败，可携带 digest 重试；超限再转 recovery</text>

  <rect class="mode-external" x="700" y="1230" width="500" height="186" rx="20" ry="20" />
  <text class="label" x="950" y="1262" text-anchor="middle">路径 B：`external_ui_package`</text>
  <text class="body" x="950" y="1288" text-anchor="middle">先研究与确认视觉方向，再写 `experience_prompts/*.md`</text>
  <text class="body" x="950" y="1312" text-anchor="middle">外部工具产出获批后，结果变成后续 MB 的 `input_artifacts`</text>
  <text class="body" x="950" y="1336" text-anchor="middle">依赖该输入的 MB 在输入就绪前必须保持 inactive</text>
  <text class="small" x="950" y="1360" text-anchor="middle">后续 MB 是 integration slice，不是现场重做视觉设计</text>
  <text class="small" x="950" y="1382" text-anchor="middle">Review 时要检查 external package 是否被正确消费且没有视觉漂移</text>

  <rect class="mode-hybrid" x="1320" y="1230" width="500" height="176" rx="20" ry="20" />
  <text class="label" x="1570" y="1262" text-anchor="middle">路径 C：`hybrid`</text>
  <text class="body" x="1570" y="1288" text-anchor="middle">外部包定义主要体验壳层，Builder 负责受控集成切片</text>
  <text class="body" x="1570" y="1312" text-anchor="middle">Builder 只接 states / routing / validation / API / 最小结构调整</text>
  <text class="body" x="1570" y="1336" text-anchor="middle">产品定义仍由 FB，执行边界仍由 MB 和质量规则控制</text>
  <text class="small" x="1570" y="1360" text-anchor="middle">如果缺少外部包，不允许 Builder 临场补一套新设计</text>

  <text class="subtitle" x="950" y="1430" text-anchor="middle">图中场景路径来自 lifecycle；体验分流与输入依赖来自 lifecycle / mission blocks / artifacts；运行层可再落到 harness 的 MB 执行与 recovery 路由。</text>
</svg>
